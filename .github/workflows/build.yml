name: Build Executables

on:
  push:
    tags:
      - "v*"        # Trigger on version tags (v1.0.0, v1.2.3, etc.)
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write    # Needed to create releases

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: AILocalManager-linux-x64
            binary: dist/AILocalManager
          - os: windows-latest
            artifact: AILocalManager-windows-x64
            binary: dist/AILocalManager.exe
          # Uncomment for macOS builds (requires macOS runner):
          # - os: macos-latest
          #   artifact: AILocalManager-macos-x64
          #   binary: dist/AILocalManager

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # Linux: install system dependencies for PySide6 / Qt
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libxkbcommon0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-keysyms1 \
            libxcb-shape0 \
            libdbus-1-3 \
            libxcb-xinerama0 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xfixes0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: python build_exe.py --console

      - name: Verify output exists
        run: |
          ls -la dist/ || dir dist\

      # Linux: make the binary executable & quick smoke test
      - name: Smoke test (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x dist/AILocalManager
          file dist/AILocalManager

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Release job — only runs on version tags
  # ---------------------------------------------------------------
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Create GitHub Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List downloaded files
        run: find artifacts/ -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*
